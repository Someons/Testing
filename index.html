<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<meta name="description" content="PillCare — Your daily medication reminder">
<link rel="manifest" href="manifest.json">
<title>PillCare — Pill Reminder</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1e2530;
    --accent: #58d9b4;
    --accent2: #3db89a;
    --warn: #f0a45a;
    --danger: #e05c5c;
    --text: #e8edf3;
    --muted: #8b95a2;
    --border: rgba(88,217,180,0.15);
    --glow: 0 0 24px rgba(88,217,180,0.18);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(88,217,180,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .container { max-width: 680px; margin: 0 auto; padding: 40px 20px 80px; position: relative; z-index: 1; }

  header { text-align: center; margin-bottom: 40px; animation: fadeDown 0.6s ease both; }
  .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), #3dc9b0);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; box-shadow: var(--glow);
  }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }
  header p { color: var(--muted); font-size: 0.88rem; font-weight: 300; }

  /* Notification permission banner */
  #notifBanner {
    background: linear-gradient(135deg, rgba(88,217,180,0.1), rgba(61,184,154,0.06));
    border: 1px solid var(--accent);
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: fadeUp 0.5s ease both;
  }
  #notifBanner .bell { font-size: 1.6rem; flex-shrink: 0; }
  #notifBanner .msg { flex: 1; }
  #notifBanner .msg strong { display: block; font-size: 0.95rem; color: var(--accent); margin-bottom: 2px; }
  #notifBanner .msg small { font-size: 0.8rem; color: var(--muted); line-height: 1.4; }
  .allow-btn {
    background: var(--accent);
    color: #0d1117;
    border: none;
    border-radius: 10px;
    padding: 9px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }
  .allow-btn:hover { opacity: 0.85; }
  #notifBanner.hidden { display: none; }

  /* Status badge */
  #swStatus {
    text-align: center;
    font-size: 0.78rem;
    padding: 6px 14px;
    border-radius: 20px;
    display: inline-block;
    margin: 0 auto 20px;
    position: relative;
    left: 50%;
    transform: translateX(-50%);
  }
  #swStatus.ok { background: rgba(88,217,180,0.1); color: var(--accent); border: 1px solid var(--accent); }
  #swStatus.warn { background: rgba(240,164,90,0.1); color: var(--warn); border: 1px solid var(--warn); }
  #swStatus.err { background: rgba(224,92,92,0.1); color: var(--danger); border: 1px solid var(--danger); }

  /* Clock */
  .clock-widget {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px 26px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeUp 0.6s 0.1s ease both;
  }
  .clock-time { font-family: 'Playfair Display', serif; font-size: 2.6rem; font-weight: 700; color: var(--accent); letter-spacing: -1px; line-height: 1; }
  .clock-date { color: var(--muted); font-size: 0.82rem; margin-top: 4px; font-weight: 300; }
  .test-btn {
    background: rgba(88,217,180,0.08);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .test-btn:hover { background: rgba(88,217,180,0.15); border-color: var(--accent); }

  /* Summary */
  .summary { display: flex; gap: 12px; margin-bottom: 24px; animation: fadeUp 0.5s 0.15s ease both; }
  .stat {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    text-align: center;
  }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 1.7rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Section title */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Add card */
  .add-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.2s ease both;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 0.75rem; color: var(--muted); font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
  .field input, .field select {
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 10px 13px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: #1e2530; }

  .color-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .color-label { font-size: 0.75rem; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .color-btn { width: 24px; height: 24px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.15s, border-color 0.15s; }
  .color-btn:hover { transform: scale(1.15); }
  .color-btn.selected { border-color: white; transform: scale(1.15); }

  .add-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #3db89a);
    border: none;
    border-radius: 12px;
    padding: 12px;
    color: #0d1117;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.93rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  .add-btn:hover { opacity: 0.9; transform: translateY(-1px); }

  /* Pill list */
  .pills-wrap { animation: fadeUp 0.6s 0.3s ease both; }
  .empty-state { text-align: center; padding: 44px 20px; color: var(--muted); }
  .empty-state .big-icon { font-size: 2.8rem; margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-size: 0.86rem; line-height: 1.7; }

  .pill-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px 18px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s, transform 0.15s;
    animation: slideIn 0.3s ease both;
  }
  .pill-card:hover { border-color: rgba(88,217,180,0.3); transform: translateY(-1px); }
  .pill-card.taken { opacity: 0.4; }
  .pill-card.taken .pill-name { text-decoration: line-through; }

  .pill-color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .pill-info { flex: 1; min-width: 0; }
  .pill-name { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pill-meta { display: flex; gap: 10px; margin-top: 3px; flex-wrap: wrap; }
  .pill-tag { font-size: 0.73rem; color: var(--muted); display: flex; align-items: center; gap: 3px; }

  .next-dose { font-size: 0.76rem; padding: 4px 10px; border-radius: 20px; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
  .next-dose.upcoming { background: rgba(88,217,180,0.1); color: var(--accent); }
  .next-dose.soon { background: rgba(240,164,90,0.12); color: var(--warn); }
  .next-dose.overdue { background: rgba(224,92,92,0.12); color: var(--danger); }
  .next-dose.taken-tag { background: rgba(255,255,255,0.05); color: var(--muted); }

  .pill-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.07);
    background: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    transition: all 0.15s;
    color: var(--muted);
  }
  .icon-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
  .icon-btn.take-btn:hover { background: rgba(88,217,180,0.12); color: var(--accent); border-color: var(--accent); }
  .icon-btn.del-btn:hover { background: rgba(224,92,92,0.1); color: var(--danger); border-color: var(--danger); }
  .icon-btn.taken-check { background: rgba(88,217,180,0.1); color: var(--accent); border-color: var(--accent); }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 0.86rem;
    color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    z-index: 999;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(12px); }  to { opacity:1; transform:translateY(0); } }
  @keyframes slideIn  { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }

  @media (max-width: 480px) {
    .form-row { grid-template-columns: 1fr; }
    .clock-time { font-size: 2rem; }
    .summary { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <div class="logo-icon">💊</div>
      <div class="logo-text">Pill<span>Care</span></div>
    </div>
    <p>Medication reminders that actually work</p>
  </header>

  <!-- Notification permission banner -->
  <div id="notifBanner">
    <div class="bell">🔔</div>
    <div class="msg">
      <strong>Enable System Notifications</strong>
      <small>Reminders will appear in your notification bar — even with tab in background</small>
    </div>
    <button class="allow-btn" onclick="requestNotifPermission()">Allow</button>
  </div>

  <!-- SW status -->
  <div id="swStatus" class="warn">⏳ Setting up reminders...</div>

  <!-- Clock -->
  <div class="clock-widget">
    <div>
      <div class="clock-time" id="clock">--:--</div>
      <div class="clock-date" id="clkDate">Loading...</div>
    </div>
    <button class="test-btn" onclick="sendTestNotif()">🔔 Test Notification</button>
  </div>

  <!-- Summary -->
  <div class="summary">
    <div class="stat"><div class="stat-num" id="sTotal">0</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-num" id="sTaken">0</div><div class="stat-label">Taken</div></div>
    <div class="stat"><div class="stat-num" id="sDue">0</div><div class="stat-label">Remaining</div></div>
  </div>

  <!-- Add -->
  <div class="section-title">Add Medication</div>
  <div class="add-card">
    <div class="form-row">
      <div class="field">
        <label>Pill Name</label>
        <input type="text" id="pillName" placeholder="e.g. Vitamin D" maxlength="30">
      </div>
      <div class="field">
        <label>Dosage</label>
        <input type="text" id="pillDose" placeholder="e.g. 500mg">
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>Reminder Time</label>
        <input type="time" id="pillTime">
      </div>
      <div class="field">
        <label>Frequency</label>
        <select id="pillFreq">
          <option value="daily">Every day</option>
          <option value="twice">Twice a day</option>
          <option value="weekly">Weekly</option>
        </select>
      </div>
    </div>
    <div class="color-row">
      <span class="color-label">Color</span>
      <div class="color-btn selected" style="background:#58d9b4" data-color="#58d9b4" onclick="pickColor(this)"></div>
      <div class="color-btn" style="background:#f0a45a" data-color="#f0a45a" onclick="pickColor(this)"></div>
      <div class="color-btn" style="background:#e05c5c" data-color="#e05c5c" onclick="pickColor(this)"></div>
      <div class="color-btn" style="background:#7b9ef0" data-color="#7b9ef0" onclick="pickColor(this)"></div>
      <div class="color-btn" style="background:#c47bf0" data-color="#c47bf0" onclick="pickColor(this)"></div>
      <div class="color-btn" style="background:#f07b9e" data-color="#f07b9e" onclick="pickColor(this)"></div>
    </div>
    <button class="add-btn" onclick="addPill()">+ Add Reminder</button>
  </div>

  <!-- List -->
  <div class="pills-wrap">
    <div class="section-title">My Medications</div>
    <div id="pillList"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Helpers ────────────────────────────────────────────
function todayKey() { return new Date().toISOString().slice(0,10); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── State ──────────────────────────────────────────────
let pills      = JSON.parse(localStorage.getItem('pc_pills')  || '[]');
let takenToday = JSON.parse(localStorage.getItem('pc_taken_' + todayKey()) || '{}');
let swReg      = null;
let selectedColor = '#58d9b4';
// Track which pills already notified this minute
let notifiedKeys = {};

// ── Service Worker ─────────────────────────────────────
async function initSW() {
  if (!('serviceWorker' in navigator)) {
    setStatus('err','❌ Service Worker not supported');
    return;
  }
  try {
    swReg = await navigator.serviceWorker.register('sw.js', { scope: './' });
    await navigator.serviceWorker.ready;
    setStatus('ok','✅ Notification engine active');
    console.log('[PillCare] SW registered');
  } catch(e) {
    console.warn('[PillCare] SW failed:', e);
    setStatus('err','⚠️ SW failed — notifications may not work');
  }
}

function setStatus(cls, msg) {
  const el = document.getElementById('swStatus');
  el.className = cls;
  el.textContent = msg;
}

// ── Notification Permission ────────────────────────────
async function requestNotifPermission() {
  if (!('Notification' in window)) {
    showToast('❌ Notifications not supported in this browser');
    return;
  }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    document.getElementById('notifBanner').classList.add('hidden');
    setStatus('ok','✅ Notification engine active');
    showToast('🔔 Notifications allowed! You\'ll get system alerts.');
    sendTestNotif();
  } else if (perm === 'denied') {
    showToast('🚫 Blocked! Go to browser Settings → Notifications to allow.');
    setStatus('err','🚫 Notifications blocked in browser settings');
  } else {
    showToast('⚠️ Please allow notifications when prompted');
  }
}

function updateBanner() {
  const banner = document.getElementById('notifBanner');
  if (Notification.permission === 'granted') {
    banner.classList.add('hidden');
  } else {
    banner.classList.remove('hidden');
  }
}

// ── Fire notification via Service Worker ───────────────
async function fireNotification(name, dose, time) {
  // Try SW first (works in background, appears in OS bar)
  if (swReg && Notification.permission === 'granted') {
    try {
      await swReg.showNotification('💊 Time for ' + name, {
        body: dose ? dose + '  •  Scheduled: ' + time : 'Scheduled: ' + time,
        icon: 'https://em-content.zobj.net/source/google/350/pill_1f48a.png',
        badge: 'https://em-content.zobj.net/source/google/350/pill_1f48a.png',
        vibrate: [200, 100, 200, 100, 300],
        requireInteraction: true,
        tag: 'pill-' + name + '-' + time,
        actions: [
          { action: 'taken', title: '✅ Taken' },
          { action: 'snooze', title: '⏰ Snooze 5 min' }
        ],
        data: { name, dose, time }
      });
      return true;
    } catch(e) {
      console.warn('[PillCare] SW showNotification failed:', e);
    }
  }
  // Fallback to basic Notification API
  if (Notification.permission === 'granted') {
    new Notification('💊 Time for ' + name, {
      body: dose ? dose + ' — Scheduled: ' + time : 'Scheduled: ' + time,
      requireInteraction: true,
      tag: 'pill-' + name + '-' + time,
    });
    return true;
  }
  return false;
}

// ── Test notification ──────────────────────────────────
async function sendTestNotif() {
  if (Notification.permission !== 'granted') {
    await requestNotifPermission();
    return;
  }
  const ok = await fireNotification('Test Pill', '100mg', new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));
  showToast(ok ? '🔔 Test notification sent! Check your notification bar.' : '❌ Could not send notification');
}

// ── Reminder check (every 30s) ─────────────────────────
function checkReminders() {
  const now = new Date();
  const hm  = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const key = hm; // once per minute

  pills.forEach(pill => {
    const nk = pill.id + '_' + hm;
    if (pill.time === hm && !takenToday[pill.id] && !notifiedKeys[nk]) {
      notifiedKeys[nk] = true;
      fireNotification(pill.name, pill.dose, pill.time);
    }

    // twice-daily: also 12h later
    if (pill.freq === 'twice') {
      const [h, m] = pill.time.split(':').map(Number);
      const h2 = String((h + 12) % 24).padStart(2,'0');
      const secondTime = h2 + ':' + String(m).padStart(2,'0');
      const nk2 = pill.id + '_2nd_' + hm;
      if (secondTime === hm && !takenToday[pill.id + '_2nd'] && !notifiedKeys[nk2]) {
        notifiedKeys[nk2] = true;
        fireNotification(pill.name + ' (2nd dose)', pill.dose, secondTime);
      }
    }
  });
}
setInterval(checkReminders, 30000);

// ── Clock ──────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clkDate').textContent =
    now.toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}
updateClock();
setInterval(updateClock, 1000);

// ── Color picker ───────────────────────────────────────
function pickColor(el) {
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedColor = el.dataset.color;
}

// ── Add pill ───────────────────────────────────────────
function addPill() {
  const name = document.getElementById('pillName').value.trim();
  const dose = document.getElementById('pillDose').value.trim();
  const time = document.getElementById('pillTime').value;
  c
